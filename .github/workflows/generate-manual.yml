name: Generate PDF Manual

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'docs/player_manual.md'
      - '.github/workflows/generate-manual.yml'
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  generate-and-commit-pdf:
    name: Generate and Commit PDF
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push commits back to the repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Convert Markdown to PDF
        uses: baileyjm02/markdown-to-pdf@v1
        with:
          image_dir: docs
          theme: github
          build_html: false
          
      # The action creates pdfs in the same directory as the md files
      - name: Commit generated PDF
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs(manual): auto-generate PDF from markdown"
          file_pattern: "docs/*.pdf"
