name: "Godot CI/CD"
on:
  push:
    branches:
      - master
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - master
      - main

jobs:
  test-game:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Godot
        run: |
          wget https://github.com/godotengine/godot/releases/download/4.6.1-stable/Godot_v4.6.1-stable_linux.x86_64.zip
          unzip Godot_v4.6.1-stable_linux.x86_64.zip
          mv Godot_v4.6.1-stable_linux.x86_64 godot
          chmod +x godot

      - name: Generate Procedural Maps
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Import Assets
        run: ./godot --path . --headless --export-pack "Linux" /dev/null || true

      - name: Godot Import/Compile Warmup
        run: ./godot --path . --headless --editor --quit-after 20


      - name: Run GUT Tests
        run: |
          ./godot --path . --headless -s addons/gut/gut_cmdln.gd -gdir=test -ginclude_subdirs -gexit

      - name: Upload Procedural Maps
        uses: actions/upload-artifact@v4
        with:
          name: procedural-maps
          path: |
            src/data/map_data.bin
            src/data/quad_data.json
            src/data/quadsphere_globe.res

  export-game:
    name: Export Game
    needs: test-game
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required to fetch tags for git describe
          lfs: true

      - name: Download Procedural Maps
        uses: actions/download-artifact@v4
        with:
          name: procedural-maps
          path: src/data/

      - name: Inject Version String
        run: |
          # fallback to 'dev' if not a tag
          TAG_NAME=${GITHUB_REF_NAME:-dev}
          # Let's try to get the latest tag instead:
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          SHORT_SHA=$(git rev-parse --short HEAD)
          
          # If this is a tag build, use the tag. Otherwise use latest tag + sha
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION_STRING="${TAG_NAME}.${SHORT_SHA}"
          else
            VERSION_STRING="${LATEST_TAG}.${SHORT_SHA}"
          fi
          
          echo "Setting version to: ${VERSION_STRING}"
          echo "VERSION_STRING=${VERSION_STRING}" >> $GITHUB_ENV
          sed -i 's/config\/version=".*"/config\/version="'"${VERSION_STRING}"'"/' project.godot
          sed -i 's/application\/product_version=".*"/application\/product_version="'"${VERSION_STRING}"'"/' export_presets.cfg
          sed -i 's/application\/file_version=".*"/application\/file_version="'"${VERSION_STRING}"'"/' export_presets.cfg

      - name: Export Game
        uses: firebelley/godot-export@v5.2.1
        with:
          godot_executable_download_url: https://github.com/godotengine/godot/releases/download/4.6.1-stable/Godot_v4.6.1-stable_linux.x86_64.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot/releases/download/4.6.1-stable/Godot_v4.6.1-stable_export_templates.tpz
          relative_project_path: ./
          archive_output: false
          cache: true
          use_preset_export_path: true

      - name: Upload Windows
        uses: actions/upload-artifact@v4
        with:
          name: Windows 
          path: |
            ./Windows Desktop/dp.exe

      - name: Upload Linux
        uses: actions/upload-artifact@v4
        with:
          name: Linux Build
          path: |
            ./Linux/dp.x86_64

      - name: Upload macOS
        uses: actions/upload-artifact@v4
        with:
          name: macOS Build
          path: |
            ./macOS/dp_mac.zip

      - name: Itch.io deployment
        if: github.ref == 'refs/heads/main'
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: |
          # Download butler
          curl -L -o butler.zip https://broth.itch.zone/butler/linux-amd64/LATEST/archive/default
          unzip butler.zip
          chmod +x butler
          
          # Prep Windows upload directory
          mkdir itch_windows
          cp "./Windows Desktop/dp.exe" itch_windows/ 2>/dev/null || true
          
          # Prep Linux upload directory (and the .pck file since embed_pck=false for Linux)
          mkdir itch_linux
          cp "./Linux/dp.x86_64" itch_linux/ 2>/dev/null || true
          
          # Prep macOS upload directory
          mkdir itch_mac
          cp "./macOS/dp_mac.zip" itch_mac/ 2>/dev/null || true
          
          # Push to Itch.io using butler
          ./butler push itch_windows vomitron/dominion-protocol:windows --userversion ${VERSION_STRING}
          ./butler push itch_linux vomitron/dominion-protocol:linux --userversion ${VERSION_STRING}
          ./butler push itch_mac vomitron/dominion-protocol:mac --userversion ${VERSION_STRING}
